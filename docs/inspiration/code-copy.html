<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Investment Form</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Dashboard Background Simulation (Blurred/Dimmed) -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none select-none overflow-hidden">
<div class="grid grid-cols-12 gap-4 p-8 w-full h-full">
<div class="col-span-2 bg-slate-200 dark:bg-slate-800 rounded-xl h-full"></div>
<div class="col-span-10 flex flex-col gap-4">
<div class="h-20 bg-slate-200 dark:bg-slate-800 rounded-xl w-full"></div>
<div class="flex-1 bg-slate-200 dark:bg-slate-800 rounded-xl w-full"></div>
</div>
</div>
</div>
<!-- Overlay Backdrop -->
<div class="fixed inset-0 bg-black/60 z-10 backdrop-blur-sm transition-opacity"></div>
<!-- Modal Container -->
<div class="relative z-20 w-full max-w-[960px] bg-white dark:bg-[#111418] rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#111418]">
<div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Add New Investment</h2>
<p class="text-sm text-slate-500 dark:text-[#9dabb9] mt-1">Enter the details of your new asset below.</p>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors rounded-full p-2 hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="overflow-y-auto flex-1 custom-scrollbar">
<div class="flex flex-col lg:flex-row">
<!-- Left Column: Form Fields -->
<div class="flex-1 p-6 space-y-6">
<!-- Asset Name -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-white">Asset Name</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined text-[20px]">search</span>
</span>
<input class="w-full h-12 pl-11 pr-4 rounded-lg bg-slate-50 dark:bg-[#1c2127] border border-slate-200 dark:border-[#3b4754] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-[#9dabb9] focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all font-medium" placeholder="e.g. Apple Inc. (AAPL)" type="text"/>
</div>
</div>
<!-- Asset Type -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-white">Asset Type</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined text-[20px]">category</span>
</span>
<select class="w-full h-12 pl-11 pr-10 rounded-lg bg-slate-50 dark:bg-[#1c2127] border border-slate-200 dark:border-[#3b4754] text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all font-medium appearance-none">
<option class="text-slate-400" disabled="" selected="" value="">Select asset type</option>
<option value="stock">Stock</option>
<option value="crypto">Cryptocurrency</option>
<option value="real_estate">Real Estate</option>
<option value="bond">Bond</option>
<option value="etf">ETF</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</span>
</div>
</div>
<!-- Quantity & Price Row -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Quantity -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-white">Quantity</label>
<div class="relative">
<input class="w-full h-12 pl-4 pr-4 rounded-lg bg-slate-50 dark:bg-[#1c2127] border border-slate-200 dark:border-[#3b4754] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-[#9dabb9] focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all font-medium" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Purchase Price -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-white">Purchase Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-[#9dabb9] font-medium">$</span>
<input class="w-full h-12 pl-8 pr-4 rounded-lg bg-slate-50 dark:bg-[#1c2127] border border-slate-200 dark:border-[#3b4754] text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-[#9dabb9] focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all font-medium" placeholder="0.00" type="number"/>
</div>
</div>
</div>
<!-- Total Value Preview -->
<div class="p-4 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined">attach_money</span>
</div>
<div class="flex flex-col">
<span class="text-xs uppercase tracking-wider font-bold text-primary">Estimated Total</span>
<span class="text-sm text-slate-600 dark:text-slate-400">Based on quantity &amp; price</span>
</div>
</div>
<span class="text-xl font-bold text-slate-900 dark:text-white">$0.00</span>
</div>
</div>
<!-- Right Column: Date Picker -->
<div class="w-full lg:w-[360px] border-t lg:border-t-0 lg:border-l border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#161b22] p-6 flex flex-col">
<label class="block text-sm font-medium text-slate-700 dark:text-white mb-4">Date of Purchase</label>
<div class="bg-white dark:bg-[#1c2127] rounded-xl border border-slate-200 dark:border-[#3b4754] shadow-sm p-4">
<div class="flex items-center justify-between mb-4">
<button class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-500 dark:text-white">
<span class="material-symbols-outlined text-[20px]">chevron_left</span>
</button>
<p class="text-slate-900 dark:text-white text-sm font-bold">October 2023</p>
<button class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors text-slate-500 dark:text-white">
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 mb-2">
<span class="text-center text-xs font-bold text-slate-400 dark:text-[#9dabb9] py-2">S</span>
<span class="text-center text-xs font-bold text-slate-400 dark:text-[#9dabb9] py-2">M</span>
<span class="text-center text-xs font-bold text-slate-400 dark:text-[#9dabb9] py-2">T</span>
<span class="text-center text-xs font-bold text-slate-400 dark:text-[#9dabb9] py-2">W</span>
<span class="text-center text-xs font-bold text-slate-400 dark:text-[#9dabb9] py-2">T</span>
<span class="text-center text-xs font-bold text-slate-400 dark:text-[#9dabb9] py-2">F</span>
<span class="text-center text-xs font-bold text-slate-400 dark:text-[#9dabb9] py-2">S</span>
</div>
<div class="grid grid-cols-7 gap-1">
<!-- Empty days -->
<span></span><span></span><span></span>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">1</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-white bg-primary shadow-sm shadow-primary/30">2</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">3</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">4</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">5</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">6</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">7</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">8</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">9</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">10</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">11</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">12</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">13</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">14</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">15</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">16</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">17</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">18</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">19</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">20</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">21</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">22</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">23</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">24</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">25</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">26</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">27</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">28</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">29</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">30</button>
<button class="h-9 w-9 flex items-center justify-center rounded-full text-sm font-medium text-slate-400 dark:text-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">1</button>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-6 py-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#111418] flex items-center justify-end gap-3">
<button class="px-6 h-12 rounded-lg text-sm font-bold text-slate-700 dark:text-white hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                Cancel
            </button>
<button class="px-6 h-12 rounded-lg bg-primary hover:bg-blue-600 text-white text-sm font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">add</span>
                Add Investment
            </button>
</div>
</div>
<!-- Background Style Adjustment to prevent scroll on body when modal is open (conceptually) -->
<style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.3);
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(156, 163, 175, 0.5);
        }
    </style>
</body></html>

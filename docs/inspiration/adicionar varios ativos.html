<!DOCTYPE html>
<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Adicionar Patrimônio - Vários Ativos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1d4ed8", // primary blue
                        "background-light": "#f8fafc",
                        "background-dark": "#111827",
                        "card-light": "#ffffff",
                        "card-dark": "#1f2937",
                        "input-dark": "#111827",
                        "border-dark": "#374151"
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }.custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-slate-200 dark:bg-black min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-4xl bg-white dark:bg-[#1e2530] rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
<h2 class="text-xl font-semibold text-slate-900 dark:text-white">Adicionar Patrimônio</h2>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
<span class="material-icons-round">close</span>
</button>
</div>
<div class="flex px-6 border-b border-slate-200 dark:border-slate-800">
<button class="px-6 py-3 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all border-b-2 border-transparent">
                Ativo Único
            </button>
<button class="px-6 py-3 text-sm font-medium text-primary border-b-2 border-primary">
                Vários Ativos
            </button>
</div>
<div class="p-6">
<div class="overflow-x-auto custom-scrollbar">
<table class="w-full text-left min-w-[700px]">
<thead>
<tr class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">
<th class="pb-4 pr-4 w-40">Data</th>
<th class="pb-4 pr-4 w-48">Classificação</th>
<th class="pb-4 pr-4 w-56">Ativo/Instituição</th>
<th class="pb-4 pr-4 w-40">Valor (R$)</th>
<th class="pb-4 w-10 text-right"></th>
</tr>
</thead>
<tbody class="space-y-2">
<tr class="group">
<td class="py-2 pr-4">
<input class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none" type="date" value="2026-03-01"/>
</td>
<td class="py-2 pr-4">
<select class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none appearance-none">
<option>Fixed Income</option>
<option>Variable Income</option>
<option>Crypto</option>
<option>Real Estate</option>
</select>
</td>
<td class="py-2 pr-4">
<select class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none appearance-none">
<option>Binance</option>
<option>NuInvest</option>
<option>BTG Pactual</option>
<option>XP Investimentos</option>
</select>
</td>
<td class="py-2 pr-4">
<div class="relative">
<input class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none" placeholder="Ex: 350000" type="number"/>
</div>
</td>
<td class="py-2 text-right">
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-icons-round text-lg">delete_outline</span>
</button>
</td>
</tr>
<tr class="group">
<td class="py-2 pr-4">
<input class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none" type="date" value="2026-03-01"/>
</td>
<td class="py-2 pr-4">
<select class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none appearance-none">
<option>Crypto</option>
<option>Fixed Income</option>
<option>Variable Income</option>
</select>
</td>
<td class="py-2 pr-4">
<select class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none appearance-none">
<option>Coinbase</option>
<option>Binance</option>
<option>Kraken</option>
</select>
</td>
<td class="py-2 pr-4">
<input class="w-full px-3 py-2 bg-slate-50 dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary transition-all text-sm outline-none" placeholder="Ex: 15000" type="number"/>
</td>
<td class="py-2 text-right">
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-icons-round text-lg">delete_outline</span>
</button>
</td>
</tr>
</tbody>
</table>
</div>
<button class="mt-4 flex items-center gap-2 text-primary hover:text-blue-600 dark:hover:text-blue-400 font-medium text-sm transition-colors">
<span class="material-icons-round text-lg">add_circle_outline</span>
                Adicionar Nova Linha
            </button>
</div>
<div class="px-6 py-6 border-t border-slate-200 dark:border-slate-800 flex justify-end items-center gap-4">
<button class="px-6 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                Cancelar
            </button>
<button class="px-8 py-2.5 text-sm font-semibold bg-primary text-white rounded hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                Adicionar
            </button>
</div>
</div>

</body></html>

<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Unified Finance Entry - Improved Hierarchy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ef4444", // Red for Movimentação/Despesa
              "accent-blue": "#3b82f6", // Blue for Patrimônio
              "background-light": "#f8fafc",
              "background-dark": "#0f172a",
              "card-dark": "#1e293b",
              "input-dark": "#0f172a",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.75rem",
            },
          },
        },
      };
    </script>
<style type="text/tailwindcss">
      @layer base {
        body {
          @apply font-display;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
          filter: invert(0.5);
        }
        .dark input[type="date"]::-webkit-calendar-picker-indicator {
          filter: invert(1);
        }
      }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
<div class="w-full max-w-lg bg-white dark:bg-card-dark rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<div class="px-6 py-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
<h2 class="text-lg font-bold text-slate-800 dark:text-white uppercase tracking-wider">Nova Entrada</h2>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full text-slate-400 dark:text-slate-500 transition-colors">
<span class="material-symbols-outlined block">close</span>
</button>
</div>
<div class="p-3 bg-slate-50 dark:bg-slate-900/50 flex gap-2">
<button class="flex-1 flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl text-sm font-bold transition-all border-2 border-transparent text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-xl">account_balance</span>
            Patrimônio
        </button>
<button class="flex-1 flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl text-sm font-bold transition-all border-2 border-primary/20 bg-white dark:bg-slate-800 text-primary shadow-sm">
<span class="material-symbols-outlined text-xl">swap_horiz</span>
            Movimentação
        </button>
</div>
<div class="p-6 space-y-8">
<div class="p-1 rounded-xl bg-slate-100 dark:bg-input-dark flex border border-slate-200 dark:border-slate-800">
<button class="flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">
                Receita
            </button>
<button class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white dark:bg-slate-800 shadow-md border border-slate-200 dark:border-slate-700 text-primary">
                Despesa
            </button>
</div>
<div class="flex gap-8 justify-center">
<button class="relative pb-1 text-sm font-semibold text-primary transition-colors">
                Uma Movimentação
                <span class="absolute bottom-0 left-0 w-full h-0.5 bg-primary rounded-full"></span>
</button>
<button class="relative pb-1 text-sm font-medium text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
                Várias Movimentações
            </button>
</div>
<div class="grid grid-cols-1 gap-5">
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Data</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-input-dark border-2 border-slate-100 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-0 focus:border-primary transition-all outline-none" type="date" value="2026-03-04"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Descrição</label>
<input class="w-full bg-slate-50 dark:bg-input-dark border-2 border-slate-100 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 focus:ring-0 focus:border-primary transition-all outline-none" placeholder="Ex: Aluguel, Supermercado..." type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Categoria</label>
<div class="relative">
<select class="w-full appearance-none bg-slate-50 dark:bg-input-dark border-2 border-slate-100 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-0 focus:border-primary transition-all outline-none">
<option>Moradia</option>
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Valor (R$)</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-input-dark border-2 border-slate-100 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-white font-semibold focus:ring-0 focus:border-primary transition-all outline-none" placeholder="0,00" type="text"/>
<div class="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col gap-0.5">
<button class="text-slate-400 hover:text-primary transition-colors leading-none">
<span class="material-symbols-outlined text-lg">stat_1</span>
</button>
<button class="text-slate-400 hover:text-primary transition-colors leading-none">
<span class="material-symbols-outlined text-lg">stat_minus_1</span>
</button>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="px-6 py-6 flex items-center justify-end gap-3 bg-slate-50/50 dark:bg-slate-900/30 border-t border-slate-100 dark:border-slate-800">
<button class="px-6 py-3 text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors">
            Cancelar
        </button>
<button class="px-10 py-3 bg-primary hover:bg-red-600 text-white text-sm font-bold rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.97]">
            Salvar Despesa
        </button>
</div>
</div>
<button class="fixed bottom-6 right-6 p-4 bg-white dark:bg-card-dark rounded-full shadow-2xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 transition-transform z-50" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-symbols-outlined block">dark_mode</span>
</button>

</body></html>
